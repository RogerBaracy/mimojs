<!doctype html>
<html>
  <head>
    <title>MimoJS</title>
    <meta charset="utf-8" />
  </head>

  <body>
    <h1>MimoJS Web Components</h1>
    <div style="margin-top: 20px">
      <mimo-input-text
        id="nome"
        placeholder="xxx-xxx-xxxx"
        pattern="^\d{3}-\d{3}-\d{4}$"
        required
      >
        <h3 slot="top">mimo-input-text</h3>
        <label slot="label">Nome</label></mimo-input-text
      >
    </div>
    <div style="margin-top: 20px">
      <h3>mimo-button</h3>
      <mimo-button></mimo-button>
    </div>

    <div style="margin-top: 20px">
      <h3>mimo-radio</h3>
      <mimo-radio></mimo-radio>
    </div>

    <div style="margin-top: 20px">
      <h3>mimo-card</h3>
      <mimo-card></mimo-card>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
