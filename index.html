<!doctype html>
<html>
  <head>
    <title>MimoJS</title>
    <meta charset="UTF-8" />
  </head>

  <body>
    <h1>MimoJS Web Components</h1>
    <div style="margin-top: 20px">
      <h3>mimo-input</h3>

      <mimo-input id="nome" placeholder="Placeholder" 
        ><label slot="label">Nome</label></mimo-input
      >
    </div>

    <div style="margin-top: 20px">
      <h3>mimo-button</h3>
      <mimo-button></mimo-button>
    </div>

    <div style="margin-top: 20px">
      <h3>mimo-radio</h3>
      <mimo-radio></mimo-radio>
    </div>

    <div style="margin-top: 20px">
      <h3>mimo-card</h3>
      <mimo-card></mimo-card>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
